<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Image Detail</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <h1 id="title">Image Detail</h1>
        <p class="muted"><a href="./imageAnalysis.html">← Back to images</a></p>
      </header>

      <main style="margin-top:12px">
        <div id="detailWrap" style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
          <div style="flex:1 1 600px;max-width:100%;">
            <div id="imageFrame" style="border:1px solid #e6e9ee;border-radius:6px;overflow:auto;max-height:calc(60vh);background:#fff;display:flex;align-items:center;justify-content:center">
              <img id="fullImage" src="" alt="Full image" style="max-width:100%;max-height:100%;object-fit:contain;transition:width 0.08s ease" />
            </div>
            <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
              <button id="zoomOutBtn" title="Zoom out">−</button>
              <button id="zoomResetBtn" title="Reset zoom">Reset</button>
              <button id="zoomInBtn" title="Zoom in">+</button>
              <span id="zoomLevel" style="margin-left:8px;font-size:13px;color:var(--muted)">100%</span>
            </div>

            <div id="notesPanel" style="margin-top:12px;">
              <h4 style="margin:6px 0">Notes</h4>
              <textarea id="notesBox" rows="16" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;resize:vertical;min-height:300px"></textarea>
              <div id="notesStatus" style="font-size:12px;color:var(--muted);margin-top:6px">Auto-saved</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;width:320px;">
            <aside style="background:#fff;border:1px solid #e6e9ee;padding:12px;border-radius:6px">
              
              <button id="contextSearchBtn" style="display:none; width:100%; margin-bottom:16px; background: #2563eb; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: 600; align-items: center; justify-content: center; gap: 6px;">
                Search Context (±15m)
              </button>

              <h3>Metadata</h3>
              <dl id="metaList"></dl>
            </aside>

            <aside id="tagsNotesPanel" style="background:#fff;border:1px solid #e6e9ee;padding:12px;border-radius:6px">
              <div>
                <h4 style="margin:6px 0">Tags</h4>
                <div id="tagsContainer" class="tag-list" aria-live="polite" style="min-height:36px"></div>
                <div style="display:flex;gap:8px;margin-top:8px">
                  <input id="tagInput" list="tagsList" type="text" placeholder="Add tag (single word)" style="flex:1" />
                  <datalist id="tagsList"></datalist>
                  <button id="addTagBtn">Add</button>
                </div>
              </div>

              </aside>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
        const sqlite3 = require('sqlite3').verbose();
        const db = new sqlite3.Database('imgDb'); // Connect to the same database

        function qs(name) {
          const params = new URLSearchParams(window.location.search);
          return params.get(name);
        }

        async function findImageById(id) {
            const query = "SELECT * FROM Images WHERE id = ?";
            return new Promise((resolve, reject) => {
                // Use .get for a single row
                db.get(query, [id], (err, row) => {
                    if (err) {
                        reject(err);
                    } else {
                        resolve(row); // 'row' will be the image object or undefined
                    }
                });
            });
        }

        function renderMetadata(image) {
          const dl = document.getElementById('metaList');
          dl.innerHTML = '';
          function add(k, v) {
            const dt = document.createElement('dt'); dt.textContent = k;
            const dd = document.createElement('dd'); dd.textContent = v;
            dl.appendChild(dt); dl.appendChild(dd);
          }
          
          let keywordsList = [];
          try {
            keywordsList = JSON.parse(image.keywords || '[]');
          } catch (e) { /* ignore parse error */ }

          add('ID', image.id);
          add('Filename', image.filename || image.imgPath.split(/[\\/]/).pop());
          add('Full Path', image.imgPath);
          // Format date for display
          let formattedDate = image.date;
          if (image.date) {
            const d = new Date(image.date);
            if (!isNaN(d)) {
              formattedDate = d.toLocaleString(undefined, {
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
              });
            }
          }
          add('Date', formattedDate);
          add('User', image.user || '—');
          add('Keywords', keywordsList.join(', '));
        }

        // --- NEW: Helpers for Context Search Button ---
        function getLocalTimeStrings(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            const hours = String(dateObj.getHours()).padStart(2, '0');
            const minutes = String(dateObj.getMinutes()).padStart(2, '0');
            const seconds = String(dateObj.getSeconds()).padStart(2, '0');
            return {
                date: `${year}-${month}-${day}`,
                time: `${hours}:${minutes}:${seconds}`
            };
        }

        function setupContextSearch(image) {
            const btn = document.getElementById('contextSearchBtn');
            if (!image.date || !image.user) return;

            const imgDate = new Date(image.date);
            if (isNaN(imgDate.getTime())) return;

            btn.style.display = 'flex';
            btn.addEventListener('click', () => {
                // Calculate -15 mins and +15 mins
                const startObj = new Date(imgDate.getTime() - 15 * 60000);
                const endObj = new Date(imgDate.getTime() + 15 * 60000);

                const startStr = getLocalTimeStrings(startObj);
                const endStr = getLocalTimeStrings(endObj);

                const params = new URLSearchParams();
                params.set('user', image.user);
                params.set('startDate', startStr.date);
                params.set('startTime', startStr.time);
                params.set('endDate', endStr.date);
                params.set('endTime', endStr.time);
                params.set('autoSearch', 'true'); 

                window.location.href = './imageAnalysis.html?' + params.toString();
            });
        }
        // ------------------------------------------------

        // Image zoom/pan handling
        let currentScale = 0.4;
        const fullImageEl = document.getElementById('fullImage');
        const zoomLevelEl = document.getElementById('zoomLevel');
        function setScale(s) {
          currentScale = Math.max(0.1, Math.min(5, s));
          // Set width as percentage so the scroll container grows and allows panning
          fullImageEl.style.width = Math.round(currentScale * 100) + '%';
          fullImageEl.style.height = 'auto';
          zoomLevelEl.textContent = Math.round(currentScale * 100) + '%';
        }
        document.getElementById('zoomInBtn').addEventListener('click', () => setScale(currentScale + 0.2));
        document.getElementById('zoomOutBtn').addEventListener('click', () => setScale(currentScale - 0.2));
        document.getElementById('zoomResetBtn').addEventListener('click', () => setScale(0.4));

        async function loadDetail() {
            const id = qs('id');
            if (!id) {
                document.getElementById('title').textContent = 'No ID provided';
                return;
            }

            try {
                const image = await findImageById(id);
                if (!image) {
                    document.getElementById('title').textContent = 'Image not found';
                } else {
                    const fname = image.filename || image.imgPath.split(/[\\/]/).pop();
                    document.getElementById('title').textContent = fname;
                    const fullImage = document.getElementById('fullImage');
                    // Use 'file://' protocol
                    fullImage.src = 'file://' + image.imgPath; 
                    fullImage.alt = fname;
                    
                    renderMetadata(image);
                    // Render tags and notes UI
                    await renderTagsAndNotes(image);
                    
                    // NEW: Initialize Context Button
                    setupContextSearch(image);

                    // reset zoom to default 40% for new image
                    setScale(0.4);
                    // populate global tag suggestions
                    try { await loadAllTags(); } catch (e) { /* ignore */ }
                }
            } catch (err) {
                console.error('Failed to load image:', err);
                document.getElementById('title').textContent = 'Error loading image';
            }
        }

        loadDetail();

        // --- Tags & Notes UI Logic ---
        async function getImageTags(imageId) {

          const rows = await new Promise((res, rej) => {
            db.all(`SELECT t.tag
                    FROM ImageTags it, tags t 
                    WHERE it.tagId = t.id AND it.imgId = ?`, 
                    [imageId], 
                    (err, rows) => err ? rej(err) : res(rows)
                  );
          });

          let arr = []
          for (const r of rows) {
            arr.push(r.tag);
          }

          return arr;
        }

        async function renderTagsAndNotes(image) {
          const tags = await getImageTags(image.id);
          const tagsContainer = document.getElementById('tagsContainer');
          tagsContainer.innerHTML = '';
          tags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag';
            btn.textContent = tag + ' ×';
            btn.setAttribute('aria-label', `Remove tag ${tag}`);
            btn.addEventListener('click', async () => {
              await removeTag(image.id, tag);
            });
            tagsContainer.appendChild(btn);
          });

          // Notes
          const notesBox = document.getElementById('notesBox');
          notesBox.value = image.note || ''; // Fixed: DB column is 'note'
        }

        async function loadAllTags() {
          // collect unique tags across DB and populate datalist
          const rows = await new Promise((res, rej) => {
            db.all(`SELECT tag FROM Tags`, [], (err, rows) => err ? rej(err) : res(rows));
          });

          let arr = []
          for (const r of rows) {
            arr.push(r.tag);
          }
          const list = document.getElementById('tagsList');
          list.innerHTML = '';

          arr.sort().forEach(tag => {
            const opt = document.createElement('option');
            opt.value = tag;
            list.appendChild(opt);
          });
        }

        //checks if a tag already exists in the tags table, if so return the id
        //otherwise insert tag into the tag table and return the new id
        async function getTagId(tag) {
          const rows = await new Promise((res, rej) => {
            db.all(`SELECT tag FROM Tags WHERE tag = ?`, [tag], (err, rows) => err ? rej(err) : res(rows));
          });

          if(rows.length === 0) {
            return await new Promise((resolve, reject) => {
              db.run(`INSERT INTO Tags (tag) VALUES (?)`, [tag], function(err) {
                if (err) reject(err);
                else resolve(this.lastID);
              });
            });
          }

          return rows[0].tag;
        }

        async function addTag(id, newTag) {
          //input sanitization
          if (!newTag) return;
          newTag = String(newTag).trim();
          if (newTag.indexOf(' ') !== -1) return;
          newTag = newTag.toLowerCase();

          //checking if this tag is already associated with this image
          const tags = await getImageTags(id);
          if (tags.includes(newTag)) return;

          //saving tag to database
          const tagId = await getTagId(newTag);
          await new Promise((resolve, reject) => {
            db.run(`INSERT INTO ImageTags (imgId, tagId) VALUES (?, ?)`, [id, tagId], function(err) {
              if (err) reject(err);
              else resolve();
            });
          });

          //updating tag locally, so we dont have to re-query the database
          tags.push(newTag);
          const row = await findImageById(id);
          await renderTagsAndNotes(Object.assign({}, row, { tags: JSON.stringify(tags) }));
          await loadAllTags();
        }

        async function removeTag(id, tagToRemove) {

          //removing tag association from database
          const tagId = await getTagId(tagToRemove);
          await new Promise((resolve, reject) => {
            db.run(`DELETE FROM ImageTags WHERE imgId = ? AND tagId = ?`, [id, tagId], 
            function(err) {
              if (err) reject(err);
              else resolve();
            });
          });

          //updating ui
          const row = await findImageById(id);
          const tags = await getImageTags(id)
          tags.filter(t => t !== tagToRemove);
          await renderTagsAndNotes(Object.assign({}, row, { tags: JSON.stringify(tags) }));
          await loadAllTags();
        }

        // Notes autosave with debounce
        let notesTimer = null;
        async function saveNotesToDb(id, notesText) {
          return new Promise((resolve, reject) => {
            db.run(`UPDATE Images SET note = ? WHERE id = ?`, [String(notesText || ''), id], function(err) {
              if (err) reject(err);
              else resolve();
            });
          });
        }

        function hookTagAndNotesHandlers() {
          const addBtn = document.getElementById('addTagBtn');
          const tagInput = document.getElementById('tagInput');
          const notesBox = document.getElementById('notesBox');
          const notesStatus = document.getElementById('notesStatus');
          const id = qs('id');
          if (!id) return;

          addBtn.addEventListener('click', async () => {
            const t = tagInput.value.trim();
            if (!t) return;
            await addTag(id, t);
            tagInput.value = '';
            tagInput.focus();
          });

          // populate datalist initially
          loadAllTags().catch(err => console.error('Could not load tag list:', err));

          tagInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              addBtn.click();
            }
          });

          notesBox.addEventListener('input', () => {
            notesStatus.textContent = 'Saving...';
            if (notesTimer) clearTimeout(notesTimer);
            notesTimer = setTimeout(async () => {
              try {
                await saveNotesToDb(id, notesBox.value);
                notesStatus.textContent = 'Auto-saved';
              } catch (err) {
                console.error('Failed to save notes:', err);
                notesStatus.textContent = 'Save failed';
              }
            }, 700);
          });
        }

        // Hook handlers: call immediately if DOM already ready, otherwise wait
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => hookTagAndNotesHandlers());
        } else {
          hookTagAndNotesHandlers();
        }
    </script>
    </body>
</html>
