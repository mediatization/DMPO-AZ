<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8" />
        <title>Image Analysis</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self' 'unsafe-inline';"
        />
        <script src="../node_modules/tesseract.js/dist/tesseract.min.js"></script>
    </head>
    <link rel="stylesheet" href="./style.css">
    <body id="body">

        <div class="container">
            <header class="page-header">
                <h1>Image Analysis</h1>
                <p class="muted">Live data from local image database (imgDb)</p>
            </header>

            <section class="main-grid">
                <aside class="left-panel" aria-label="Advanced search">
                    
                    <div class="control-group">
                        <label>Image Processing</label>
                        <div id="processingStatus" style="font-size: 13px; color: var(--muted); margin-top: 4px; min-height: 2.4em; line-height: 1.2;">
                            Initializing...
                        </div>
                    </div>
                    
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;">
                    <div class="control-group">
                        <div id="counts" style="margin-bottom:8px">
                            <div><strong>Registered:</strong> <span id="registeredCount">0</span></div>
                            <div><strong>Results:</strong> <span id="resultsCount">0</span></div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="keywordsInput">Keywords (OCR)</label>
                        <input id="keywordsInput" type="search" placeholder="Enter keywords (comma or space separated)" />
                    </div>

                    <div class="control-group">
                        <label for="keywordMode">Keyword Search Mode</label>
                        <select id="keywordMode">
                            <option value="AND">All keywords (AND)</option>
                            <option value="OR">Any keyword (OR)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="tagsInput">Tags</label>
                        <input id="tagsInput" type="search" placeholder="Enter tags (comma or space separated)" />
                    </div>

                    <div class="control-group">
                        <label for="tagMode">Tag Search Mode</label>
                        <select id="tagMode">
                            <option value="AND">All tags (AND)</option>
                            <option value="OR">Any tag (OR)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Date/Time Range</label>
                        
                        <div style="background: #f8fafc; border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-bottom: 8px;">
                            <label for="startDate" style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; display:block">Start Range</label>
                            <input id="startDate" type="date" aria-label="Start Date" style="width:100%; margin-bottom:6px;" />
                            <input id="startTime" type="time" step="1" aria-label="Start Time" style="width:100%;" />
                        </div>

                        <div style="background: #f8fafc; border: 1px solid var(--border); padding: 10px; border-radius: 6px;">
                            <label for="endDate" style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; display:block">End Range</label>
                            <input id="endDate" type="date" aria-label="End Date" style="width:100%; margin-bottom:6px;" />
                            <input id="endTime" type="time" step="1" aria-label="End Time" style="width:100%;" />
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="userInput">User</label>
                        <input id="userInput" type="text" placeholder="username" />
                    </div>

                    <div class="control-group small" style="display:flex;gap:8px">
                        <button id="searchBtn">Search</button>
                        <button id="clearFilters">Clear filters</button>
                    </div>
                </aside>

                <main class="right-panel">
                    <div class="table-wrap">
                        <table class="image-table" aria-label="Images table">
                            <colgroup>
                                <col style="width:120px">
                                <col style="width:140px">
                                <col style="width:140px">
                                <col style="min-width:160px">
                                <col style="min-width:160px">
                            </colgroup>
                            <thead>
                                    <tr>
                                        <th>Preview</th>
                                        <th>Timestamp</th>
                                        <th>User</th>
                                        <th>Keywords</th>
                                        <th>Tags</th>
                                    </tr>
                            </thead>
                            <tbody id="imageTableBody">
                                </tbody>
                        </table>
                    </div>
                    
                    <div id="paginationControls" class="pagination-controls" aria-label="Pagination Navigation">
                        </div>
                    
                </main>
            </section>

            </div>

    </body>

    <script>
        // This script must remain in HTML because Tesseract won't work in the external JS file
        
        const { ipcRenderer } = require('electron/renderer');
        const fs = require('fs').promises;
        const path = require('path');
        
        const statusEl = document.getElementById('processingStatus');
        const prepositions = new Set(["about", "above", "across", "after", "against", "along", "among", "around", "before", "behind", "below", "beneath", "beside", "between", "beyond", "despite", "down", "during", "except", "for", "from", "inside", "into", "like", "near", "off", "onto", "opposite", "out", "outside", "over", "past", "round", "since", "than", "through", "toward", "under", "underneath", "unlike", "until", "upon", "via", "with", "within", "without"]);

        // This function takes an array of file paths parses user/date info from the path
        // then OCRs the images and adds them to the database
        async function performOCR(filePathsToScan, db) {
            statusEl.textContent = 'Initializing OCR worker...';
            const worker = await Tesseract.createWorker("eng", 1, {
                workerPath: "../node_modules/tesseract.js/dist/worker.min.js",
                corePath: "../node_modules/tesseract.js-core/",
                langPath: "./",
                logger: m => {
                    console.log(m);
                    if (m.status === 'recognizing text') {
                        statusEl.textContent = `Processing (${(m.progress * 100).toFixed(0)}%)...`;
                    }
                },
                gzip: false,
                workerBlobURL: false
            });

            let processedCount = 0;
            
            for (let i = 0; i < filePathsToScan.length; i++) {
                const filePath = filePathsToScan[i];
                statusEl.textContent = `File ${i + 1} of ${filePathsToScan.length}: ${filePath}`;
                
                let text;
                try {
                    // Recognize using the file path string
                    const result = await worker.recognize(filePath);
                    text = result.data.text;
                } catch (e) {
                    console.error(`Failed to recognize ${filePath}:`, e);
                    continue; // Skip this file
                }
                
                let user, isoDate;
                try {
                    // Parse User: Assumes path is like .../decrypted/[user]/[filename]
                    user = filePath.split(path.sep).at(-2); 

                    // Parse Date: Assumes filename is like YYYY_MM_DD_HH_MM_SS...
                    const filename = path.basename(filePath);
                    let dateString = filename.split('_');
                    const dateObj = new Date(
                        parseInt(dateString[0]),
                        parseInt(dateString[1]) - 1, // Date constructor is 0-indexed for months
                        parseInt(dateString[2]),
                        parseInt(dateString[3]),
                        parseInt(dateString[4]),
                        parseInt(dateString[5]), 
                        0 //don't have milliseconds to parse
                    );
                    // Note: .toISOString() converts local time (from file name) to UTC
                    isoDate = dateObj.toISOString();
                    
                    if (!user || isNaN(dateObj.getTime())) {
                        throw new Error('Invalid path format');
                    }

                } catch (e) {
                    console.warn(`Could not parse user/date for ${filePath}. Skipping.`);
                    continue; // Skip file if path format is wrong
                }

                // Processing words on the image
                const words = text.split(/\s+/);
                const keywordsFound = new Set();
                for (let word of words) {
                    //may want to reconsider what we are sanitizing by at somepoint
                    word = word.toLowerCase().replace(/[^a-z0-9]/gi, ''); 
                    if (word.length >= 4 && !prepositions.has(word)) {
                        keywordsFound.add(word);
                    }
                }
                const uniqueKeywords = [...keywordsFound];

                // Insert into DB 
                const lastID = await new Promise((resolve, reject) => {
                    db.run(`INSERT INTO Images (imgPath, date, user) VALUES (?, ?, ?)`, 
                        [filePath, isoDate, user], 
                        function(err) {
                            if (err) {
                                console.error('DB Insert Error (Images):', err.message);
                                if (err.message.includes('UNIQUE constraint failed')) {
                                    statusEl.textContent = `Skipped: ${filePath} (already processed).`;
                                }
                                resolve(null); // Resolve with null on error
                            } else {
                                resolve(this.lastID);
                            }
                        }
                    );
                });

                // If image insert was successful, insert its keywords
                if (lastID) {
                    processedCount++;
                    const stmt = db.prepare(`INSERT OR IGNORE INTO ImageWords (imgId, word) VALUES (?, ?)`);
                    for (const word of uniqueKeywords) {
                        stmt.run(lastID, word);
                    }
                    stmt.finalize();
                }
            }
            
            await worker.terminate();
            statusEl.textContent = `Processing complete (${processedCount} new files).`;
            return processedCount;
        }

        async function searchForImagesToScan(db) {
            statusEl.textContent = 'Scanning for new images...';
            const scannedImgs = new Set();
            let toScan = [];

            // Get all paths already in the DB
            await new Promise((resolve, reject) => {
                db.each("SELECT imgPath FROM Images", (err, row) => {
                    if (err) return reject(err);
                    scannedImgs.add(row.imgPath);
                }, (err, count) => err ? reject(err) : resolve(count));
            });

            const decryptedPath = path.join(__dirname, '../decrypted');
            
            // Recursively scan the decrypted directory
            async function scanDirectory(dirPath) {
                try {
                    const items = await fs.readdir(dirPath);
                    for (const item of items) {
                        const fullPath = path.join(dirPath, item);
                        const stat = await fs.stat(fullPath);
                        
                        if (stat.isDirectory()) {
                            await scanDirectory(fullPath);
                        } else if (!scannedImgs.has(fullPath)) {
                            toScan.push(fullPath);
                        }
                    }
                } catch (error) {
                    console.log('Error reading directory:', error.message);
                }
            }

            await scanDirectory(decryptedPath);

            // Process any new images found
            if (toScan.length > 0) {
                statusEl.textContent = `Found ${toScan.length} new images to process.`;
                const processed = await performOCR(toScan, db);
                return processed;
            } else {
                statusEl.textContent = 'No new images found.';
                return 0;
            }
        }

        // Expose the Tesseract functions to the UI script
        window.tesseractFunctions = {
            searchForImagesToScan,
            getStatusEl: () => statusEl
        };
    </script>
    
    <script type="module" src="./imageAnalysis.js"></script>
</html>
