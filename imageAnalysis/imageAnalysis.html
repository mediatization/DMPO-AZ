<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8" />
        <title>Image Analysis</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self' 'unsafe-inline';"
        />
        <script src="../node_modules/tesseract.js/dist/tesseract.min.js"></script>
    </head>
    <link rel="stylesheet" href="./style.css">
    <body id="body">

        <div class="container">
            <header class="page-header">
                <h1>Image Analysis</h1>
                <p class="muted">Live data from local image database (imgDb)</p>
            </header>

            <section class="main-grid">
                <aside class="left-panel" aria-label="Advanced search">
                    
                    <div class="control-group">
                        <label>Image Processing</label>
                        <div id="processingStatus" style="font-size: 13px; color: var(--muted); margin-top: 4px; min-height: 2.4em; line-height: 1.2;">
                            Initializing...
                        </div>
                    </div>
                    
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;">
                    <div class="control-group">
                        <div id="counts" style="margin-bottom:8px">
                            <div><strong>Registered:</strong> <span id="registeredCount">0</span></div>
                            <div><strong>Results:</strong> <span id="resultsCount">0</span></div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="keywordsInput">Keywords (OCR)</label>
                        <input id="keywordsInput" type="search" placeholder="Enter keywords (comma or space separated)" />
                    </div>

                    <div class="control-group">
                        <label for="keywordMode">Keyword Search Mode</label>
                        <select id="keywordMode">
                            <option value="AND">All keywords (AND)</option>
                            <option value="OR">Any keyword (OR)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="tagsInput">Tags</label>
                        <input id="tagsInput" type="search" placeholder="Enter tags (comma or space separated)" />
                    </div>

                    <div class="control-group">
                        <label for="tagMode">Tag Search Mode</label>
                        <select id="tagMode">
                            <option value="AND">All tags (AND)</option>
                            <option value="OR">Any tag (OR)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Date/Time Range</label>
                        
                        <div style="background: #f8fafc; border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-bottom: 8px;">
                            <label for="startDate" style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; display:block">Start Range</label>
                            <input id="startDate" type="date" aria-label="Start Date" style="width:100%; margin-bottom:6px;" />
                            <input id="startTime" type="time" step="1" aria-label="Start Time" style="width:100%;" />
                        </div>

                        <div style="background: #f8fafc; border: 1px solid var(--border); padding: 10px; border-radius: 6px;">
                            <label for="endDate" style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; display:block">End Range</label>
                            <input id="endDate" type="date" aria-label="End Date" style="width:100%; margin-bottom:6px;" />
                            <input id="endTime" type="time" step="1" aria-label="End Time" style="width:100%;" />
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="userInput">User</label>
                        <input id="userInput" type="text" placeholder="username" />
                    </div>

                    <div class="control-group small" style="display:flex;gap:8px">
                        <button id="searchBtn">Search</button>
                        <button id="clearFilters">Clear filters</button>
                    </div>
                </aside>

                <main class="right-panel">
                    <div class="table-wrap">
                        <table class="image-table" aria-label="Images table">
                            <colgroup>
                                <col style="width:120px">
                                <col style="width:140px">
                                <col style="width:140px">
                                <col style="min-width:160px">
                                <col style="min-width:160px">
                            </colgroup>
                            <thead>
                                    <tr>
                                        <th>Preview</th>
                                        <th>Timestamp</th>
                                        <th>User</th>
                                        <th>Keywords</th>
                                        <th>Tags</th>
                                    </tr>
                            </thead>
                            <tbody id="imageTableBody">
                                </tbody>
                        </table>
                    </div>
                    
                    <div id="paginationControls" class="pagination-controls" aria-label="Pagination Navigation">
                        </div>
                    
                </main>
            </section>

            </div>

    </body>

    <script type="module">

        //setting up our database
        const sqlite3 = require('sqlite3').verbose();

        const fs = require('fs').promises;
        const path = require('path');
        
        const db = new sqlite3.Database('imgDb'); 

        db.serialize(() => {
            db.run(`CREATE TABLE IF NOT EXISTS Images (
                id INTEGER PRIMARY KEY AUTOINCREMENT, 
                imgPath TEXT NOT NULL UNIQUE, 
                date TEXT, 
                user TEXT,
                notes TEXT DEFAULT ''
            )`);
            db.run(`CREATE TABLE IF NOT EXISTS ImageWords (
                imgId INTEGER NOT NULL, 
                word TEXT NOT NULL, 
                PRIMARY KEY(imgId, word), 
                FOREIGN KEY (imgId) REFERENCES Images(id) ON DELETE CASCADE
            )`);
            db.run(`CREATE TABLE IF NOT EXISTS Tags (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                tag TEXT NOT NULL UNIQUE
            )`);
            db.run(`CREATE TABLE IF NOT EXISTS ImageTags (
                imgId INTEGER NOT NULL,
                tagId INTEGER NOT NULL,
                PRIMARY KEY(imgId, tagId),
                FOREIGN KEY (imgId) REFERENCES Images(id) ON DELETE CASCADE,
                FOREIGN KEY (tagId) REFERENCES Tags(id) ON DELETE CASCADE
            )`);
        });

        const prepositions = new Set(["about", "above", "across", "after", "against", "along", "among", "around", "before", "behind", "below", "beneath", "beside", "between", "beyond", "despite", "down", "during", "except", "for", "from", "inside", "into", "like", "near", "off", "onto", "opposite", "out", "outside", "over", "past", "round", "since", "than", "through", "toward", "under", "underneath", "unlike", "until", "upon", "via", "with", "within", "without"]);
        const statusEl = document.getElementById('processingStatus');

        // This function takes an array of file paths parses user/date info from the path
        // then OCRs the images and adds them to the database, tesseract seems to only
        // work when ran inside of an html file, otherwise this would all be in the js file
        async function performOCR(filePathsToScan) {
            statusEl.textContent = 'Initializing OCR worker...';
            const worker = await Tesseract.createWorker("eng", 1, {
                workerPath: "../node_modules/tesseract.js/dist/worker.min.js",
                corePath: "../node_modules/tesseract.js-core/",
                langPath: "./",
                logger: m => {
                    console.log(m);
                    if (m.status === 'recognizing text') {
                        statusEl.textContent = `Processing (${(m.progress * 100).toFixed(0)}%)...`;
                    }
                },
                gzip: false,
                workerBlobURL: false
            });

            let processedCount = 0;
            
            for (let i = 0; i < filePathsToScan.length; i++) {
                const filePath = filePathsToScan[i];
                statusEl.textContent = `File ${i + 1} of ${filePathsToScan.length}: ${filePath}`;
                
                let text;
                try {
                    // Recognize using the file path string
                    const result = await worker.recognize(filePath);
                    text = result.data.text;
                } catch (e) {
                    console.error(`Failed to recognize ${filePath}:`, e);
                    continue; // Skip this file
                }
                
                let user, isoDate;
                try {
                    // Parse User: Assumes path is like .../decrypted/[user]/[filename]
                    user = filePath.split(path.sep).at(-2); 

                    // Parse Date: Assumes filename is like YYYY_MM_DD_HH_MM_SS...
                    const filename = path.basename(filePath);
                    let dateString = filename.split('_');
                    const dateObj = new Date(
                        parseInt(dateString[0]),
                        parseInt(dateString[1]) - 1, // Date constructor is 0-indexed for months
                        parseInt(dateString[2]),
                        parseInt(dateString[3]),
                        parseInt(dateString[4]),
                        parseInt(dateString[5]), 
                        0 //don't have milliseconds to parse
                    );
                    // Note: .toISOString() converts local time (from file name) to UTC
                    isoDate = dateObj.toISOString();
                    
                    if (!user || isNaN(dateObj.getTime())) {
                        throw new Error('Invalid path format');
                    }

                } catch (e) {
                    console.warn(`Could not parse user/date for ${filePath}. Skipping.`);
                    continue; // Skip file if path format is wrong
                }

                // Processing words on the image
                const words = text.split(/\s+/);
                const keywordsFound = new Set();
                for (let word of words) {
                    //may want to reconsider what we are sanitizing by at somepoint
                    word = word.toLowerCase().replace(/[^a-z0-9]/gi, ''); 
                    if (word.length >= 4 && !prepositions.has(word)) {
                        keywordsFound.add(word);
                    }
                }
                const uniqueKeywords = [...keywordsFound];

                // Insert into DB 
                const lastID = await new Promise((resolve, reject) => {
                    db.run(`INSERT INTO Images (imgPath, date, user) VALUES (?, ?, ?)`, 
                        [filePath, isoDate, user], 
                        function(err) {
                            if (err) {
                                console.error('DB Insert Error (Images):', err.message);
                                if (err.message.includes('UNIQUE constraint failed')) {
                                    statusEl.textContent = `Skipped: ${filePath} (already processed).`;
                                }
                                resolve(null); // Resolve with null on error
                            } else {
                                resolve(this.lastID);
                            }
                        }
                    );
                });

                // If image insert was successful, insert its keywords
                if (lastID) {
                    processedCount++;
                    const stmt = db.prepare(`INSERT OR IGNORE INTO ImageWords (imgId, word) VALUES (?, ?)`);
                    for (const word of uniqueKeywords) {
                        stmt.run(lastID, word);
                    }
                    stmt.finalize();
                }
            }
            
            await worker.terminate();
            statusEl.textContent = `Processing complete (${processedCount} new files).`;
        }

        async function searchForImagesToScan() {
            statusEl.textContent = 'Scanning for new images...';
            const scannedImgs = new Set();
            let toScan = [];

            // Get all paths already in the DB
            await new Promise((resolve, reject) => {
                db.each("SELECT imgPath FROM Images", (err, row) => {
                    if (err) return reject(err);
                    scannedImgs.add(row.imgPath);
                }, (err, count) => err ? reject(err) : resolve(count));
            });

            const decryptedPath = path.join(__dirname, '../decrypted');
            
            // Recursively scan the decrypted directory
            async function scanDirectory(dirPath) {
                try {
                    const items = await fs.readdir(dirPath);
                    for (const item of items) {
                        const fullPath = path.join(dirPath, item);
                        const stat = await fs.stat(fullPath);
                        
                        if (stat.isDirectory()) {
                            await scanDirectory(fullPath);
                        } else if (!scannedImgs.has(fullPath)) {
                            toScan.push(fullPath);
                        }
                    }
                } catch (error) {
                    console.log('Error reading directory:', error.message);
                }
            }

            await scanDirectory(decryptedPath);

            // Process any new images found
            if (toScan.length > 0) {
                statusEl.textContent = `Found ${toScan.length} new images to process.`;
                await performOCR(toScan); 
            } else {
                statusEl.textContent = 'No new images found.';
            }
        }

        // Database Query Functions (Exposed to UI script) ---
        window.getRegisteredCount = async () => {
            return new Promise((res, rej) => {
                db.get("SELECT COUNT(*) as count FROM Images", (err, row) => {
                    if (err) rej(err);
                    else res(row ? row.count : 0);
                });
            });
        };

        //needs to be cleaned up eventually to be more human readable and easier to modify
        //also some of the ways we currently query seem ineffecient
        //for example can potentially optimize by checking if we are only searching by tags
        //and then querying Tags table first instead of alway sstarting with Images table
        window.queryDatabase = async (filters) => {
            const { searchKeywords, searchMode, searchTags, tagMode, startDate, endDate, startTime, endTime, searchUser, page, itemsPerPage } = filters;

            const queryParams = [];
            let baseQuery = `SELECT DISTINCT T1.id FROM Images AS T1`;
            let joinClause = '';
            const whereClauses = [];
            
            if (searchKeywords.length > 0) {
                joinClause = ` INNER JOIN ImageWords AS T2 ON T1.id = T2.imgId`;
                const placeholders = searchKeywords.map(() => '?').join(',');
                whereClauses.push(`T2.word IN (${placeholders})`);
                queryParams.push(...searchKeywords);
            }

            if (searchTags.length > 0) {
                joinClause += ` INNER JOIN ImageTags as T3 on T1.id = T3.imgid`;
                joinClause += ` INNER JOIN Tags as T4 on T3.tagId = T4.id`
                const tagPlaceholders = searchTags.map(() => '?').join(',');
                whereClauses.push(`T4.tag IN (${tagPlaceholders})`);
                queryParams.push(...searchTags);
            }

            // --- Start Filter ---
            if (startDate) {
                // User provided a specific date (and optional time)
                let s = startDate;
                if (startTime) s += ' ' + startTime; // use space separator
                else s += ' 00:00:00'; // default to start of day
                
                // Compare against local time
                whereClauses.push(`datetime(T1.date, 'localtime') >= ?`);
                queryParams.push(s);
            } else if (startTime) {
                // User provided Time ONLY (scan all days)
                // Extract HH:MM:SS from the LOCAL time of the image
                whereClauses.push(`strftime('%H:%M:%S', T1.date, 'localtime') >= ?`);
                queryParams.push(startTime);
            }

            // --- End Filter ---
            if (endDate) {
                let e = endDate;
                if (endTime) e += ' ' + endTime; // use space separator
                else e += ' 23:59:59'; // default to end of day
                
                whereClauses.push(`datetime(T1.date, 'localtime') <= ?`);
                queryParams.push(e);
            } else if (endTime) {
                // User provided Time ONLY
                whereClauses.push(`strftime('%H:%M:%S', T1.date, 'localtime') <= ?`);
                queryParams.push(endTime);
            }

            if (searchUser) {
                whereClauses.push(`T1.user LIKE ?`);
                queryParams.push(`%${searchUser}%`);
            }
            
            let whereString = whereClauses.length > 0 ? ` WHERE ${whereClauses.join(' AND ')}` : '';
            let groupByString = '';
            if (searchKeywords.length > 0) {
                groupByString = ` GROUP BY T1.id`;
                if (searchMode === 'AND') {
                    groupByString += ` HAVING COUNT(DISTINCT T2.word) = ?`;
                    queryParams.push(searchKeywords.length);
                }
            }
            if (searchTags.length > 0) {
                if (groupByString === '') {
                    groupByString = ` GROUP BY T1.id`;
                    if (tagMode === 'AND') {
                        groupByString += ` HAVING COUNT(DISTINCT T4.tag) = ?`
                        queryParams.push(searchTags.length);
                    }
                }
                else if (tagMode === 'AND') {
                    groupByString += ` AND COUNT(DISTINCT T4.tag) = ?`
                    queryParams.push(searchTags.length);
                }
            }

            const idQuery = baseQuery + joinClause + whereString + groupByString;
            
            const countSql = `SELECT COUNT(*) as count FROM (${idQuery})`;
            const totalRow = await new Promise((res, rej) => {
                db.get(countSql, queryParams, (err, row) => err ? rej(err) : res(row));
            });
            const totalResults = totalRow.count;
            if (totalResults === 0) {
                return { totalResults: 0, images: [] };
            }
            const offset = (page - 1) * itemsPerPage;
            const pagedIdQuery = idQuery + ` ORDER BY T1.date DESC, T1.id DESC LIMIT ? OFFSET ?`;
            const idRows = await new Promise((res, rej) => {
                    db.all(pagedIdQuery, [...queryParams, itemsPerPage, offset], (err, rows) => err ? rej(err) : res(rows));
            });
            if (idRows.length === 0) {
                return { totalResults: totalResults, images: [] };
            }
            const ids = idRows.map(r => r.id);
            const idPlaceholders = ids.map(() => '?').join(',');
            const dataQuery = `
                SELECT id, imgPath, date, user
                FROM Images 
                WHERE id IN (${idPlaceholders})
                ORDER BY date DESC, id DESC`;
            const images = await new Promise((res, rej) => {
                db.all(dataQuery, ids, (err, rows) => err ? rej(err) : res(rows));
            });
            for (const img of images) {
                img.keywords = await new Promise((resolve, reject) => {
                    
                    db.all(`SELECT word FROM ImageWords WHERE imgId = ?`, [img.id], (err, rows) => {
                        if (err) {
                            reject(err);
                        } else {
                            // Extract words from all rows
                            const words = rows.map(row => row.word);
                            resolve(words);
                        }
                    });
                });

                img.thumbnail = img.imgPath; 
                img.full = img.imgPath; 
                img.id = img.id.toString();
            }
            return { totalResults, images };
        };

        // Expose a way for the UI script to register its functions
        window.performSearch = null;
        window.updateRegisteredCount = null;

        // This function will be called by imageAnalysis-ui.js when it loads
        window.runAppInitialization = async () => {
            // Run the automatic scan
            await searchForImagesToScan();
            
            // Update the "Registered" count
            if (window.updateRegisteredCount) {
                await window.updateRegisteredCount();
            }
        };

    </script>
    
    <script type="module" src="./imageAnalysis-ui.js"></script>
</html>
