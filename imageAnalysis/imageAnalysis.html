<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8" />
        <title>Image Analysis</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self' 'unsafe-inline';"
        />
        <script src="../node_modules/tesseract.js/dist/tesseract.min.js"></script>
    </head>
    <link rel="stylesheet" href="./style.css">
    <body id="body">

        <div class="container">
            <header class="page-header">
                <h1>Image Analysis (UI Prototype)</h1>
                <p class="muted">Using dummy data. Backend integration will be wired later.</p>
            </header>

            <section class="main-grid">
                <aside class="left-panel" aria-label="Advanced search">
                    <div class="control-group">
                        <div id="counts" style="margin-bottom:8px">
                            <div><strong>Registered:</strong> <span id="registeredCount">0</span></div>
                            <div><strong>Results:</strong> <span id="resultsCount">0</span></div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="keywordsInput">Keywords (OCR)</label>
                        <input id="keywordsInput" type="search" placeholder="Enter keywords (comma or space separated)" />
                    </div>

                    <div class="control-group">
                        <label for="keywordMode">Match mode</label>
                        <select id="keywordMode" aria-label="Match mode">
                            <option value="AND">AND (all keywords)</option>
                            <option value="OR">OR (any keyword)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="startDate">Start date</label>
                        <input id="startDate" type="date" />
                    </div>

                    <div class="control-group">
                        <label for="endDate">End date</label>
                        <input id="endDate" type="date" />
                    </div>

                    <div class="control-group">
                        <label for="userInput">User</label>
                        <input id="userInput" type="text" placeholder="username" />
                    </div>

                    <div class="control-group small" style="display:flex;gap:8px">
                        <button id="searchBtn">Search</button>
                        <button id="clearFilters">Clear filters</button>
                    </div>
                </aside>

                <main class="right-panel">
                    <div class="table-wrap">
                        <table class="image-table" aria-label="Images table">
                            <thead>
                                    <tr>
                                        <th>Preview</th>
                                        <th>Timestamp</th>
                                        <th>User</th>
                                        <th>Keywords</th>
                                    </tr>
                            </thead>
                            <tbody id="imageTableBody">
                                <!-- rows rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </main>
            </section>

            <!-- Image preview opens in its own page (imageDetail.html?id=...) to compartmentalize future features -->
        </div>

    </body>
    <script type="module" src="./imageAnalysis-ui.js"></script>
</html>
