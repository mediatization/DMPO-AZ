<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8" />
        <title>Image Analysis</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self' 'unsafe-inline';"
        />
        <script src="../node_modules/tesseract.js/dist/tesseract.min.js"></script>
    </head>
    <link rel="stylesheet" href="./style.css">
    <body id="body">

        <!-- We use a script inside the html as that is the only way we can get the OCR library to function -->
        <script type="module">
            //our imports
            const sqlite3 = require('sqlite3').verbose();
            const fs = require('fs').promises;
            const path = require('path');

            const db = new sqlite3.Database('imgDb');
            db.run("CREATE TABLE IF NOT EXISTS Images (imgId INT PRIMARY KEY, imgPath VARCHAR(1024) NOT NULL UNIQUE, userKey VARCHAR(8) NOT NULL, timestamp DATETIME NOT NULL)");
            db.run("CREATE TABLE IF NOT EXISTS ImageWords (imgId INT NOT NULL, word VARCHAR(64) NOT NULL, PRIMARY KEY(imgId, word), FOREIGN KEY (imgId) REFERENCES Images(imgId) ON DELETE CASCADE)");

            //not currently used, will be helpful later for storing notes and tagged words of images
            db.run("CREATE TABLE IF NOT EXISTS ImageNotes (imgId INT PRIMARY KEY, imgNote TEXT,  FOREIGN KEY (imgId) REFERENCES Images(imgId) ON DELETE CASCADE)")
            //maybe at some point change to use a tag from a tags table so researchers can easily re-use tages for images
            db.run("CREATE TABLE IF NOT EXISTS ImageTags (imgId INT NOT NULL, tag VARCHAR(64) NOT NULL, PRIMARY KEY(imgId, tag), FOREIGN KEY (imgId) REFERENCES Images(imgId) ON DELETE CASCADE)");
            

            //list of common words that we wont want to search through, may want to expand at some point
            const prepositions = new Set(["about", "above", "across", "after", "against", "along", "among", "around", "before",
            "behind", "below", "beneath", "beside", "between", "beyond", "despite", "down", "during", "except", 
            "for", "from", "inside", "into", "like", "near", "off", "onto", "opposite", "out", "outside",
            "over", "past", "round", "since", "than", "through", "toward", "under", "underneath", "unlike",
            "until", "upon", "via", "with", "within", "without"]);

            
            document.getElementById("imgSearch").addEventListener("search", (event) => {
                console.log(event.target.value);
                const searchTerm = event.target.value.toLowerCase();

                db.each(`SELECT DISTINCT i.imgId, i.imgPath 
                        FROM Images i
                        INNER JOIN ImageWords iw ON i.imgId = iw.imgId
                        WHERE LOWER(iw.word) LIKE ?`, 
                        ['%' + searchTerm + '%'], 
                        (err, row) => {
                            if(err) {
                                console.log(err);
                            }
                            console.log("Row info:", row);    
                });
            });

            document.getElementById("imageSelector").addEventListener("change", (event) => {
                
                const fileList = event.target.files; 
                //passing the relevant data to an async function for actual processing
                performOCR(fileList);

            });

            async function performOCR(fileList) {
                
                //making the ocr worker
                const worker = await Tesseract.createWorker("eng", 1, {
                    workerPath: "../node_modules/tesseract.js/dist/worker.min.js",
                    corePath: "../node_modules/tesseract.js-core/",
                    langPath: "./",
                    logger: m => console.log(m),
                    // Disable gzip since the eng.traineddata file we are using is already uncompressed
                    gzip: false,
                    workerBlobURL: false
                });
                
                //for now this will just be an int starting at zero, eventually will need to replace
                //with a query that grabs the max id from the database
                let nextId;
                db.get("SELECT MAX(imgId) as maxId FROM Images", (err, row) => {
                    if(row.maxId) {
                        nextId = row.maxId;
                    }
                    else {
                        nextId = 0;
                    }
                });

                //iterating through our files
                for (const file of fileList) {
                    //adding file to the database
 
                    nextId++;

                    //we know the date is the part of the image path separated by _
                    //we have to also split out the \ on the first value
                    let dateString = file.path.split('_');
                    const dateObj = new Date(parseInt(dateString[0].split('\\').at(-1)), 
                                             parseInt(dateString[1]), parseInt(dateString[2]), 
                                             parseInt(dateString[3]), parseInt(dateString[4]), 
                                             parseInt(dateString[5]), 0);
                    const isoString = dateObj.toISOString();
                    //TODO: need to get user id from filepath
                    
                    let user = dateString[0].split(`\\`).at(-2);

                    db.run(`INSERT INTO Images (imgId, imgPath, userKey, timestamp) VALUES (?, ?, ?, ?)`, [nextId, file.path, user, isoString]);

                    //running ocr on the image
                    const { data: { text } } = await worker.recognize(file.path);
                    
                    //for all the words we found in the ocr, adding to our img database
                    //splitting words by new lines and by spaces
                    const words = text.split(/\s+/); 
                    for (let word of words) {
                        word = word.toLowerCase();
                        
                        if (prepositions.has(word) || word.length < 4) {
                            continue;
                        }

                        //adding to our database
                        db.run(`INSERT INTO ImageWords (imgId, word) VALUES (?, ?)`, [nextId, word], (err) => {
                            if(err) {
                                console.log("duplicate word?");
                            }
                        });

                    }
                }
                
                //terminating the worker
                await worker.terminate();

                db.each("SELECT * FROM Images", (err, row) => {
                    console.log("Row info:", row);    
                });

                db.each("SELECT * FROM ImageWords", (err, row) => {
                    console.log("Row info:", row);    
                });
            }

            const searchForImagesToScan = async function() {
                
                const scannedImgs = new Set();
                let toScan = [];

                db.each("SELECT imgPath FROM Images", (err, row) => {
                    scannedImgs.add(row.imgPath);
                });

                console.log(scannedImgs);

                const decryptedPath = path.join(__dirname, '../decrypted');

                async function getAllFiles() {
                    try {
                        const items = await fs.readdir(decryptedPath);
                        await Promise.all(
                            items.map(async (item) => {
                                const fullPath = path.join(decryptedPath, item);
                                const stat = await fs.stat(fullPath);
                                
                                if (stat.isDirectory()) {
                                    // Recursive call for directories
                                    //should only happen once for each user at the /decrypt/ level, and subfolders should have no directories within them
                                    getAllFiles(fullPath); 
                                } else if(!scannedImgs.has(fullPath)) {
                                    toScan.push(fullPath);
                                }
                            })
                        );
                    }
                    catch (error) {
                        console.log('Error reading directory:', error);
                    }
                }

                await getAllFiles();


                console.log(toScan);

                performOCR(toScan);
            }

            document.getElementById("imgScan").addEventListener("click", searchForImagesToScan);
        </script>

        <div>
            <h1>Process Images</h1>
            <label for="imageSelector">Choose images: </label>
            <input type="file" id="imageSelector" multiple>
        </div>

        <hr>

        <div>
            <h1>Search Images</h1>
            <label for="imgSearch">Search through processed images</label> 
            <input type="search" id="imgSearch">
            <input type="button" id="imgScan" value="Automatically Scan for new images">
        </div>

        <div id="testDiv" style="display: flex; flex-direction: column;"></div>
    </body>
    <script src="./imageAnalysis.js"></script>
</html>
