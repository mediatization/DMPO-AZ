<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8" />
        <title>Image Analysis</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self' 'unsafe-inline';"
        />
        <script src="../node_modules/tesseract.js/dist/tesseract.min.js"></script>
    </head>
    <link rel="stylesheet" href="./style.css">
    <body id="body">

        <div class="container">
            <header class="page-header">
                <h1>Image Analysis</h1>
                <p class="muted">Live data from local image database (imgDb)</p>
            </header>

            <section class="main-grid">
                <aside class="left-panel" aria-label="Advanced search">
                    
                    <div class="control-group">
                        <label for="imageSelector">Process New Images</label>
                        <input type="file" id="imageSelector" multiple style="margin-bottom: 8px; font-size: 12px;">
                        
                        <label for="processingUser" style="font-size: 13px; margin-bottom: 4px; margin-top: 8px;">Process as user:</label>
                        <input id="processingUser" type="text" placeholder="username" value="default_user">
                        
                        <div id="processingStatus" style="font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 1.2em;"></div>
                    </div>
                    
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;">
                    <div class="control-group">
                        <div id="counts" style="margin-bottom:8px">
                            <div><strong>Registered:</strong> <span id="registeredCount">0</span></div>
                            <div><strong>Results:</strong> <span id="resultsCount">0</span></div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="keywordsInput">Keywords (OCR)</label>
                        <input id="keywordsInput" type="search" placeholder="Enter keywords (comma or space separated)" />
                    </div>

                    <div class="control-group">
                        <label for="keywordMode">Keyword Search Mode</label>
                        <select id="keywordMode">
                            <option value="AND">All keywords (AND)</option>
                            <option value="OR">Any keyword (OR)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="startDate">Date Range</label>
                        <div style="display:flex;gap:4px">
                            <input id="startDate" type="date" placeholder="Start Date" />
                            <input id="endDate" type="date" placeholder="End Date" />
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="userInput">User</label>
                        <input id="userInput" type="text" placeholder="username" />
                    </div>

                    <div class="control-group small" style="display:flex;gap:8px">
                        <button id="searchBtn">Search</button>
                        <button id="clearFilters">Clear filters</button>
                    </div>
                </aside>

                <main class="right-panel">
                    <div class="table-wrap">
                        <table class="image-table" aria-label="Images table">
                            <thead>
                                    <tr>
                                        <th>Preview</th>
                                        <th>Timestamp</th>
                                        <th>User</th>
                                        <th>Keywords</th>
                                    </tr>
                            </thead>
                            <tbody id="imageTableBody">
                                </tbody>
                        </table>
                    </div>
                    
                    <div id="paginationControls" class="pagination-controls" aria-label="Pagination Navigation">
                        </div>
                    
                </main>
            </section>

            </div>

    </body>

    <script type="module">
        // --- 1. DB & OCR Setup ---
        const sqlite3 = require('sqlite3').verbose();
        const db = new sqlite3.Database('imgDb'); // Connects to ./imgDb

        // New schema to support all UI fields
        db.serialize(() => {
            db.run(`CREATE TABLE IF NOT EXISTS Images (
                id INTEGER PRIMARY KEY AUTOINCREMENT, 
                filename TEXT, 
                imgPath TEXT NOT NULL UNIQUE, 
                date TEXT, 
                user TEXT, 
                keywords TEXT 
            )`);
            db.run(`CREATE TABLE IF NOT EXISTS ImageWords (
                imgId INTEGER NOT NULL, 
                word TEXT NOT NULL, 
                PRIMARY KEY(imgId, word), 
                FOREIGN KEY (imgId) REFERENCES Images(id) ON DELETE CASCADE
            )`);
        });

        const prepositions = new Set(["about", "above", "across", "after", "against", "along", "among", "around", "before", "behind", "below", "beneath", "beside", "between", "beyond", "despite", "down", "during", "except", "for", "from", "inside", "into", "like", "near", "off", "onto", "opposite", "out", "outside", "over", "past", "round", "since", "than", "through", "toward", "under", "underneath", "unlike", "until", "upon", "via", "with", "within", "without"]);
        const statusEl = document.getElementById('processingStatus');

        // --- 2. OCR Processing Logic ---
        document.getElementById("imageSelector").addEventListener("change", (event) => {
            const fileList = event.target.files;
            const user = document.getElementById('processingUser').value || 'default_user';
            if (fileList.length > 0) {
                performOCR(fileList, user);
            }
        });

        async function performOCR(fileList, user) {
            statusEl.textContent = 'Initializing OCR worker...';
            const worker = await Tesseract.createWorker("eng", 1, {
                workerPath: "../node_modules/tesseract.js/dist/worker.min.js",
                corePath: "../node_modules/tesseract.js-core/",
                langPath: "./", // Assumes eng.traineddata is in the same folder
                logger: m => {
                    console.log(m);
                    if (m.status === 'recognizing text') {
                        statusEl.textContent = `Processing (${(m.progress * 100).toFixed(0)}%)...`;
                    }
                },
                gzip: false,
                workerBlobURL: false
            });

            const date = new Date().toISOString().split('T')[0];
            let processedCount = 0;
            
            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                statusEl.textContent = `File ${i + 1} of ${fileList.length}: ${file.name}`;
                
                const { data: { text } } = await worker.recognize(file.path);
                
                // Process words
                const words = text.split(/\s+/);
                const keywordsFound = new Set();
                for (let word of words) {
                    word = word.toLowerCase().replace(/[^a-z0-9]/gi, ''); // Sanitize
                    if (word.length >= 4 && !prepositions.has(word)) {
                        keywordsFound.add(word);
                    }
                }
                const uniqueKeywords = [...keywordsFound];
                const keywordsJson = JSON.stringify(uniqueKeywords);

                // Insert into DB
                const lastID = await new Promise((resolve, reject) => {
                    db.run(`INSERT INTO Images (filename, imgPath, date, user, keywords) VALUES (?, ?, ?, ?, ?)`, 
                        [file.name, file.path, date, user, keywordsJson], 
                        function(err) {
                            if (err) {
                                console.error('DB Insert Error (Images):', err.message);
                                if (err.message.includes('UNIQUE constraint failed')) {
                                    statusEl.textContent = `Skipped: ${file.name} (already processed).`;
                                }
                                resolve(null); // Resolve with null on error
                            } else {
                                resolve(this.lastID);
                            }
                        }
                    );
                });

                // If image insert was successful, insert its keywords
                if (lastID) {
                    processedCount++;
                    const stmt = db.prepare(`INSERT OR IGNORE INTO ImageWords (imgId, word) VALUES (?, ?)`);
                    for (const word of uniqueKeywords) {
                        stmt.run(lastID, word);
                    }
                    stmt.finalize();
                }
            }
            
            await worker.terminate();
            statusEl.textContent = `Processing complete (${processedCount} new files).`;

            // Refresh the table and counts by calling functions from imageAnalysis-ui.js
            if (window.performSearch) {
                window.performSearch(true); // Re-run search
            }
            if (window.updateRegisteredCount) {
                window.updateRegisteredCount(); // Update "Registered" count
            }
        }

        // --- 3. Database Query Functions (Exposed to UI script) ---

        // Called by UI script on load
        window.getRegisteredCount = async () => {
            return new Promise((res, rej) => {
                db.get("SELECT COUNT(*) as count FROM Images", (err, row) => {
                    if (err) rej(err);
                    else res(row ? row.count : 0);
                });
            });
        };

        // Called by UI script's performSearch function
        window.queryDatabase = async (filters) => {
            const { searchKeywords, searchMode, startDate, endDate, searchUser, page, itemsPerPage } = filters;

            const queryParams = [];
            let baseQuery = `SELECT DISTINCT T1.id FROM Images AS T1`;
            let joinClause = '';
            const whereClauses = [];

            // Add keyword search clauses
            if (searchKeywords.length > 0) {
                joinClause = ` INNER JOIN ImageWords AS T2 ON T1.id = T2.imgId`;
                const placeholders = searchKeywords.map(() => '?').join(',');
                whereClauses.push(`T2.word IN (${placeholders})`);
                queryParams.push(...searchKeywords);
            }
            // Add date/user clauses
            if (startDate) {
                whereClauses.push(`T1.date >= ?`);
                queryParams.push(startDate);
            }
            if (endDate) {
                whereClauses.push(`T1.date <= ?`);
                queryParams.push(endDate);
            }
            if (searchUser) {
                // Use LIKE for partial match on user
                whereClauses.push(`T1.user LIKE ?`);
                queryParams.push(`%${searchUser}%`);
            }

            let whereString = whereClauses.length > 0 ? ` WHERE ${whereClauses.join(' AND ')}` : '';
            let groupByString = '';
            
            if (searchKeywords.length > 0) {
                groupByString = ` GROUP BY T1.id`;
                if (searchMode === 'AND') {
                    groupByString += ` HAVING COUNT(DISTINCT T2.word) = ?`;
                    queryParams.push(searchKeywords.length);
                }
            }
            
            const idQuery = baseQuery + joinClause + whereString + groupByString;
            
            // 1. Get total count of matching IDs
            const countSql = `SELECT COUNT(*) as count FROM (${idQuery})`;
            const totalRow = await new Promise((res, rej) => {
                db.get(countSql, queryParams, (err, row) => err ? rej(err) : res(row));
            });
            const totalResults = totalRow.count;

            if (totalResults === 0) {
                return { totalResults: 0, images: [] };
            }

            // 2. Get IDs for the *current page*
            const offset = (page - 1) * itemsPerPage;
            const pagedIdQuery = idQuery + ` ORDER BY T1.date DESC, T1.id DESC LIMIT ? OFFSET ?`;
            
            const idRows = await new Promise((res, rej) => {
                    db.all(pagedIdQuery, [...queryParams, itemsPerPage, offset], (err, rows) => err ? rej(err) : res(rows));
            });
            
            if (idRows.length === 0) {
                return { totalResults: totalResults, images: [] };
            }

            // 3. Get full data just for the paged IDs
            const ids = idRows.map(r => r.id);
            const idPlaceholders = ids.map(() => '?').join(',');
            const dataQuery = `
                SELECT id, filename, imgPath, date, user, keywords 
                FROM Images 
                WHERE id IN (${idPlaceholders})
                ORDER BY date DESC, id DESC`;
            
            const images = await new Promise((res, rej) => {
                db.all(dataQuery, ids, (err, rows) => err ? rej(err) : res(rows));
            });

            // 4. Post-process data for the UI
            images.forEach(img => {
                try {
                    img.keywords = JSON.parse(img.keywords || '[]');
                } catch (e) {
                    img.keywords = []; // Default to empty on parse error
                }
                // UI needs 'thumbnail' and 'full' properties. We'll use imgPath.
                img.thumbnail = img.imgPath; 
                img.full = img.imgPath; 
                img.id = img.id.toString(); // UI expects string IDs
            });
            
            return { totalResults, images };
        };

        // Expose a way for the UI script to register its functions
        window.performSearch = null;
        window.updateRegisteredCount = null;

    </script>
    
    <script type="module" src="./imageAnalysis-ui.js"></script>
</html>
